<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Experience — Celerity Energy Advisors</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #232428;
  }

  #map {
    width: 100%;
    height: 100vh;
  }

  .leaflet-control-zoom { display: none !important; }
  .leaflet-control-attribution {
    background: rgba(20,22,25,0.6) !important;
    color: #444 !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: #4ab3c8 !important; }
  .leaflet-interactive { cursor: default !important; }

  /* ── Pulsing dot ── */
  .pulse-dot {
    position: relative;
    width: 12px;
    height: 12px;
  }

  .pulse-dot .core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px;
    height: 10px;
    background: #4ab3c8;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    z-index: 2;
  }

  .pulse-dot .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid #4ab3c8;
    opacity: 0;
    animation: ripple 2.4s ease-out infinite;
  }

  .pulse-dot .ring:nth-child(1) { animation-delay: 0s; }
  .pulse-dot .ring:nth-child(2) { animation-delay: 0.8s; }
  .pulse-dot .ring:nth-child(3) { animation-delay: 1.6s; }

  @keyframes ripple {
    0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(4.5); opacity: 0; }
  }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  center: [18, 8],
  zoom: 2,
  zoomControl: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  dragging: false,
  touchZoom: false,
  keyboard: false,
  boxZoom: false,
  tap: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

const pulseIcon = L.divIcon({
  html: `<div class="pulse-dot">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="core"></div>
  </div>`,
  className: '',
  iconSize: [12, 12],
  iconAnchor: [6, 6],
});

const locations = [
  [56.5,    3.0 ],  // North Sea Central Graben
  [10.5,  -61.5 ],  // Columbus Basin
  [-18.5,  124.5],  // Canning Basin
  [-45.8,  -67.5],  // Golfo San Jorge
  [7.0,   -74.5 ],  // Magdalena Basin
  [31.2,   30.5 ],  // Nile Delta
  [-39.5,  173.8],  // Taranaki Basin
  [6.0,   103.5 ],  // Malay Basin
  [-5.5,  107.0 ],  // NW Java Sea
  [26.0,  -90.0 ],  // Gulf of Mexico
  [52.0,  -114.5],  // Alberta Basin
  [70.2,  -148.5],  // North Slope
  [-22.0,  -40.5],  // Campos Basin
  [-24.5,  -43.5],  // Santos Basin
  [40.4,   50.0 ],  // South Caspian
  [-10.0,  11.5 ],  // Angola Offshore
  [47.5,  -103.0],  // Williston Basin
  [40.5,  -104.0],  // Denver-Julesburg Basin
];

locations.forEach(([lat, lng]) => {
  L.marker([lat, lng], { icon: pulseIcon, interactive: false }).addTo(map);
});
</script>
</body>
</html>
