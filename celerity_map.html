  }
  .leaflet-control-attribution a { color: #4ab3c8 !important; }
  .leaflet-interactive { cursor: default !important; }

  /* ── Pulsing dot ── */
  .pulse-dot {
    position: relative;
    width: 12px;
    height: 12px;
    cursor: pointer !important;
  }
  .pulse-dot .core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    background: #4ab3c8;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    z-index: 2;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .pulse-dot:hover .core {
    transform: translate(-50%, -50%) scale(1.5);
    background: #6dcfdf;
  }
  .pulse-dot .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid #4ab3c8;
    opacity: 0;
    animation: ripple 2.4s ease-out infinite;
  }
  .pulse-dot .ring:nth-child(1) { animation-delay: 0s; }
  .pulse-dot .ring:nth-child(2) { animation-delay: 0.8s; }
  .pulse-dot .ring:nth-child(3) { animation-delay: 1.6s; }

  @keyframes ripple {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.7; }
    100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
  }

  /* ── Floating info card ── */

    position: fixed;
    z-index: 9999;
    background: rgba(18, 20, 24, 0.97);
    border: 1px solid rgba(74,179,200,0.35);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.65);
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    max-width: 300px;
    min-width: 240px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  }
  .tip-year {
    font-size: 10px;

const card_el = document.getElementById('info-card');
const CARD_W = 305;
const CARD_GAP = 16;

function showCard(html, mouseX, mouseY) {
  card_el.innerHTML = html;
  card_el.style.opacity = '0';
  card_el.style.left = '-9999px';
  card_el.style.top = '-9999px';
  card_el.style.display = 'block';

  // Measure actual rendered height
  const cardH = card_el.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Horizontal: prefer right of cursor, flip left if near right edge
  let left = mouseX + CARD_GAP;
  if (left + CARD_W > vw - 8) {
    left = mouseX - CARD_W - CARD_GAP;
  }
  // Clamp to viewport
  left = Math.max(8, Math.min(left, vw - CARD_W - 8));

  // Vertical: prefer above cursor, flip below if near top
  let top = mouseY - cardH - CARD_GAP;
  if (top < 8) {
    top = mouseY + CARD_GAP;
  }
  // Clamp to viewport
  top = Math.max(8, Math.min(top, vh - cardH - 8));

  card_el.style.left = left + 'px';
  card_el.style.top  = top  + 'px';
  card_el.style.opacity = '1';
}

function hideCard() {
  card_el.style.opacity = '0';
  // Hide after fade
  setTimeout(() => { card_el.style.left = '-9999px'; }, 150);
}

locations.forEach(loc => {
  const marker = L.marker(loc.latlng, { icon: pulseIcon, interactive: true }).addTo(map);

  marker.on('mouseover', function(e) {
    showCard(loc.html, e.originalEvent.clientX, e.originalEvent.clientY);
  });
  marker.on('mousemove', function(e) {
    showCard(loc.html, e.originalEvent.clientX, e.originalEvent.clientY);
  });
  marker.on('mouseout', function() {
    hideCard();
  });
});
</script>
</body>
</html>
